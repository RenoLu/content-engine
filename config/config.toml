# ============================================================================
# Content Engine — non-secret tunables.
# Secrets (API keys, tokens) belong in .env, NOT here.
# Values here can be overridden by environment variables where noted.
# ============================================================================

[source]
# Which source supplies the daily candidate list:
#   "trending_html" -> parse the real github.com/trending page, then hydrate each
#                      repo via the official GitHub REST API. Falls back to (and
#                      backfills from) "search_api" if the page can't be parsed.
#   "search_api"    -> approximate trending via the GitHub Search API only.
# Override with the GITHUB_SOURCE environment variable.
provider = "trending_html"

[source.trending]
# Tunables for the github.com/trending page source (provider = "trending_html").
since = "daily"                # daily | weekly | monthly
language = ""                  # trending language tab, e.g. "python" ("" = all)
spoken_language_code = ""      # e.g. "en" ("" = all)
limit = 25                     # how many trending rows to take
min_results_fallback = 5       # below this many hydrated repos, fall back to / backfill from search_api

[source.github]
# The "search_api" provider (and the trending fallback) approximate "trending"
# via the GitHub Search API (compliant, documented). See docs/API_FINDINGS.md.
#
# Two complementary queries are merged and de-duplicated:
#   1. "rising"  -> recently-created repos that already have traction
#   2. "active"  -> established popular repos with very recent pushes
min_stars = 150               # floor for the "active" query
rising_min_stars = 75         # floor for the "rising" (recently created) query
rising_created_within_days = 30   # how new a "rising" repo may be
active_pushed_within_days = 14    # how recently an "active" repo must have been pushed
per_query_limit = 50          # results pulled per query (GitHub caps page size at 100)
# Optional filters. Empty lists = no filter.
languages = []                # e.g. ["Python", "Rust", "Go", "TypeScript"]
topics = []                   # e.g. ["llm", "developer-tools"]
# AI-only mode: when true, hard-filter out non-AI repos (topic/keyword match in
# ranking/scorer.py). Committed default is false (general-purpose); the daily
# workflow turns it on in production via the REQUIRE_AI_TOPIC env Variable.
require_ai_topic = false
# Topics that strongly signal relevance to our audience (used as a scoring bonus, not a filter):
preferred_topics = [
    "llm", "ai", "machine-learning", "developer-tools", "cli", "database",
    "kubernetes", "observability", "data-engineering", "rust", "golang",
    "python", "typescript", "fintech", "quant", "trading", "security",
    "infrastructure", "framework", "api", "compiler", "runtime",
]

[ranking]
# Hard filters — a repo failing any of these is skipped (with a stored reason).
min_stars = 150
min_readme_chars = 800        # skip thin READMEs
skip_archived = true
skip_forks = true             # skip forks unless strongly justified (see allow_forks_min_stars)
allow_forks_min_stars = 20000 # a fork this popular is likely a real project; allow it
require_description = true
# 0 = no max age. Committed default off (keeps the engine general + tests permissive);
# production sets MAX_REPO_AGE_DAYS=60 (env) so we only feature genuinely recent
# projects (~1-2 months old). Repos created longer ago are skipped with "too_old".
max_repo_age_days = 0
# Block-list of owners/repos we never want to feature (substring match on full_name, lowercased):
blocklist = []

[scoring]
# Weights for the composite score. Higher score = more likely to be picked.
# Score is computed on log-scaled stars + recency + traction + topic relevance.
weight_stars = 1.0
weight_recent_push = 0.6      # rewards repos pushed very recently
weight_rising = 0.8           # rewards high stars-per-day-since-creation
weight_topic_match = 0.5      # rewards preferred_topics overlap
weight_readme_quality = 0.3   # rewards substantial READMEs
weight_has_homepage = 0.1
weight_trending_rank = 0.4    # rewards a high position on github.com/trending (trending_html source)

[content]
# Target length window for the long-form article body (markdown), in words.
target_words_min = 450
target_words_max = 900
# Microblog/summary length budget (chars) for platforms like Bluesky/Mastodon.
summary_max_chars = 280
max_tags = 4

[review]
# The reviewer must clear these bars for the content to be eligible to publish.
min_overall_score = 7.0       # on a 0-10 scale
block_on_high_severity = true # any high-severity issue blocks publishing
# Rewrite-until-pass cap: a draft failing any gate is revised and re-checked up
# to this many rounds; content that never passes is NOT published. Bounds cost.
max_revisions = 3

[engagement]
# Dedicated "catches attention / sounds human" review gate, run after the
# fact-checker. enabled = false reverts to fact-checker-only behavior.
enabled = true
min_attention_score = 6.5     # 0-10: hook, distinctive angle, reader pull
min_voice_score = 6.5         # 0-10: human/natural voice, no AI-tells/filler
block_on_high_severity = true # any high-severity attention/voice issue blocks publishing

[quality]
# Deterministic final checks (run after the AI reviewer).
banned_phrases = [
    "game changer", "game-changer", "revolutionary", "this changes everything",
    "unlocks the future", "ai is transforming everything", "groundbreaking",
    "next big thing", "supercharge your workflow", "10x productivity",
    "in today's fast-paced world", "in the world of", "look no further",
    "dive in", "delve into", "in conclusion", "in summary,",
    "as an ai", "i cannot", "elevate your", "seamlessly integrate",
    # AI-tell filler / cliches (high-confidence; conservative to avoid false positives)
    "it's worth noting", "it's important to note", "a testament to",
    "ever-evolving", "in the realm of", "needless to say", "at the end of the day",
]
max_banned_phrase_hits = 0    # any banned phrase blocks publishing in live mode
require_repo_name_in_body = true
min_headings = 2

[outreach]
# Engagement automation (like / follow / reply across platforms). Separate from
# [engagement] above, which is the content quality-review gate. See docs/OUTREACH.md.
# Secrets + run mode come from env (OUTREACH_MODE, OUTREACH_ENABLED, creds).
enabled = true                 # kill switch (env OUTREACH_ENABLED overrides)
approval = false               # true = draft only, log as pending_approval
platforms = ["bluesky", "mastodon", "devto"]
per_query_limit = 15           # targets fetched per query per platform
like_ratio = 0.8               # fraction of eligible targets to like
reply_ratio = 0.35             # fraction of eligible targets to reply to
seed = 1337                    # deterministic sampling/pacing seed

# Topic queries used to discover posts/people worth engaging.
queries = [
    "data engineering", "lakehouse", "streaming ML", "MLOps",
    "AI agents", "LLM applications", "quant", "iceberg",
]

# Per-platform DAILY caps. Start conservative and raise only if clean. LinkedIn is
# intentionally lowest (it penalizes automation). Scale all at once with env
# OUTREACH_CAP_SCALE.
[outreach.caps.bluesky]
like = 20
follow = 10
reply = 8

[outreach.caps.mastodon]
like = 20
follow = 10
reply = 8

[outreach.caps.linkedin]
like = 8
follow = 4
reply = 3
